<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeelanceBox Tools</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --ink: #18181b;
        --ink-muted: #71717a;
        --surface: #f9fafb;
        --surface-elevated: #ffffff;
        --accent: #059669;
        --border: #e4e4e7;
      }

      body {
        width: 380px;
        min-height: 480px;
        font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
        background: var(--surface);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.5;
      }

      .header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
      }

      .header h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .header p {
        font-size: 12px;
        color: var(--ink-muted);
        margin-top: 4px;
      }

      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
      }

      .tab {
        flex: 1;
        padding: 10px 0;
        text-align: center;
        font-size: 12px;
        font-weight: 500;
        color: var(--ink-muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
      }

      .tab:hover {
        color: var(--ink);
      }

      .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .panel {
        padding: 16px 20px;
        display: none;
      }

      .panel.active {
        display: block;
      }

      textarea {
        width: 100%;
        height: 120px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        font-family: "Geist Mono", ui-monospace, monospace;
        font-size: 12px;
        resize: vertical;
        background: var(--surface-elevated);
        color: var(--ink);
      }

      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.15);
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: transform 0.15s;
      }

      button:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: var(--ink);
        color: var(--surface-elevated);
      }

      .btn-secondary {
        background: var(--surface-elevated);
        color: var(--ink);
        border: 1px solid var(--border);
      }

      .output {
        width: 100%;
        min-height: 80px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-top: 12px;
        font-family: "Geist Mono", ui-monospace, monospace;
        font-size: 12px;
        background: var(--surface);
        color: var(--ink-muted);
        white-space: pre-wrap;
        word-break: break-all;
      }

      .case-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .case-result {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        background: var(--surface-elevated);
      }

      .case-result label {
        display: block;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--ink-muted);
        margin-bottom: 4px;
      }

      .case-result output {
        display: block;
        font-family: "Geist Mono", ui-monospace, monospace;
        font-size: 12px;
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>ZeelanceBox</h1>
      <p>Developer tools, running locally.</p>
    </div>

    <div class="tabs">
      <button class="tab active" data-panel="json-formatter">JSON</button>
      <button class="tab" data-panel="case-converter">Case</button>
    </div>

    <!-- JSON Formatter Panel -->
    <div class="panel active" id="json-formatter">
      <textarea id="json-input" placeholder="Paste JSON here...">{"name":"ZeelanceBox","version":1,"active":true}</textarea>
      <div class="actions">
        <button class="btn-primary" id="json-format">Format</button>
        <button class="btn-secondary" id="json-minify">Minify</button>
        <button class="btn-secondary" id="json-clear">Clear</button>
      </div>
      <div class="output" id="json-output">Formatted output will appear here.</div>
    </div>

    <!-- Case Converter Panel -->
    <div class="panel" id="case-converter">
      <textarea id="case-input" placeholder="Type text to convert..." style="height: 60px;">hello world example</textarea>
      <div class="case-grid">
        <div class="case-result">
          <label>camelCase</label>
          <output id="out-camel">helloWorldExample</output>
        </div>
        <div class="case-result">
          <label>snake_case</label>
          <output id="out-snake">hello_world_example</output>
        </div>
        <div class="case-result">
          <label>kebab-case</label>
          <output id="out-kebab">hello-world-example</output>
        </div>
        <div class="case-result">
          <label>PascalCase</label>
          <output id="out-pascal">HelloWorldExample</output>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
