<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0; padding: 0; width: 1280px; height: 800px;
      display: flex; align-items: center; justify-content: center;
      background: #09090b;
      background-image: 
        radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
        linear-gradient(to right, #18181b 1px, transparent 1px),
        linear-gradient(to bottom, #18181b 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      overflow: hidden;
    }
    .frame {
      width: 480px; height: 520px; border-radius: 16px; overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 50px rgba(16, 185, 129, 0.15);
      border: 1px solid #27272a;
    }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <div class="frame">
    <iframe id="popup-iframe" src="dist/popup.html"></iframe>
  </div>

  <!-- Interactive Controller for Manual Capture -->
  <div style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 100;">
    <button onclick="runPhase(1)" style="padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 700; background: #18181b; color: #f4f4f5; border: 1px solid #27272a; cursor: pointer; transition: all 0.2s; font-family: sans-serif; letter-spacing: 0.05em; text-transform: uppercase;">1. JSON Format</button>
    <button onclick="runPhase(2)" style="padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 700; background: #18181b; color: #f4f4f5; border: 1px solid #27272a; cursor: pointer; transition: all 0.2s; font-family: sans-serif; letter-spacing: 0.05em; text-transform: uppercase;">2. Diff Checker</button>
    <button onclick="runPhase(3)" style="padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 700; background: #18181b; color: #f4f4f5; border: 1px solid #27272a; cursor: pointer; transition: all 0.2s; font-family: sans-serif; letter-spacing: 0.05em; text-transform: uppercase;">3. JWT Debugger</button>
  </div>
  <script>
    const iframe = document.getElementById("popup-iframe");
    
    // Automation helper
    window.runPhase = async (phase) => {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      if (phase === 1) {
        // Phase 1: Format default JSON
        const formatBtn = doc.getElementById("json-format");
        if (formatBtn) formatBtn.click();
      } else if (phase === 2) {
        // Phase 2: Switch to Diff tab and populate
        const tabs = doc.querySelectorAll(".tab");
        const diffTab = Array.from(tabs).find(t => t.textContent.includes("DIFF"));
        if (diffTab) diffTab.click();
        
        const origText = doc.getElementById("diff-original");
        const modText = doc.getElementById("diff-modified");
        if (origText && modText) {
          origText.value = "{\n  \"name\": \"ZeroWebTools\",\n  \"status\": \"active\",\n  \"version\": \"0.1.2\"\n}";
          modText.value = "{\n  \"name\": \"ZeroWebTools Companion\",\n  \"status\": \"active\",\n  \"version\": \"0.1.3\",\n  \"features\": [\"CORS Bypass\"]\n}";
          const analyzeBtn = doc.getElementById("diff-analyze");
          if (analyzeBtn) analyzeBtn.click();
        }
      } else if (phase === 3) {
        // Phase 3: Switch to JWT tab and populate
        const tabs = doc.querySelectorAll(".tab");
        const jwtTab = Array.from(tabs).find(t => t.textContent.includes("JWT"));
        if (jwtTab) jwtTab.click();
        
        const jwtInput = doc.getElementById("jwt-input");
        if (jwtInput) {
          jwtInput.value = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c";
          jwtInput.dispatchEvent(new Event("input", { bubbles: true }));
        }
      }
    };
  </script>
</body>
</html>
